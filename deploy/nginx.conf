# ─────────────────────────────────────────────────────────────────────────────
# Interchained Atlas — nginx reverse proxy
# Mode: Cloudflare proxied + SSL "Flexible" (CF↔origin is PLAIN HTTP on :80)
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/interchained-atlas
#   sudo ln -s /etc/nginx/sites-available/interchained-atlas /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# The Next.js app must be listening on 127.0.0.1:3000 (see the systemd unit).
# ─────────────────────────────────────────────────────────────────────────────

# Upstream: the standalone Next.js server, bound to localhost only.
upstream atlas_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Trust Cloudflare's X-Forwarded-Proto when present; fall back to origin scheme.
# In Flexible mode Cloudflare sends "https" here even though it connects over HTTP —
# this is how Next.js learns the visitor's real scheme without a redirect loop.
map $http_x_forwarded_proto $atlas_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name atlas.interchained.org;

    # ── Restore the visitor's real IP from Cloudflare ──────────────────────────
    # Refresh ranges from https://www.cloudflare.com/ips/ periodically.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── IMPORTANT (Flexible mode): do NOT redirect to https here. ──────────────
    # Cloudflare connects over HTTP; a redirect to https would loop forever
    # (ERR_TOO_MANY_REDIRECTS). Let Cloudflare's edge handle the https upgrade.

    # ── Compression (let nginx handle it; the app serves uncompressed) ─────────
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/font-woff2 text/xml application/xml;

    # ── Immutable, fingerprinted Next.js build assets ──────────────────────────
    location /_next/static/ {
        proxy_pass http://atlas_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── Everything else ────────────────────────────────────────────────────────
    location / {
        proxy_pass http://atlas_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $atlas_proto;   # trusts CF (see map above)
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    access_log /var/log/nginx/atlas.access.log;
    error_log  /var/log/nginx/atlas.error.log;
}

# ─────────────────────────────────────────────────────────────────────────────
# UPGRADE PATH → Cloudflare SSL "Full (Strict)" (recommended once you're stable)
#
# 1. Cloudflare dashboard → SSL/TLS → Overview → set mode to "Full (strict)".
# 2. SSL/TLS → Origin Server → "Create Certificate" → save the cert + key to:
#       /etc/ssl/cloudflare/atlas.pem      (origin certificate)
#       /etc/ssl/cloudflare/atlas.key      (private key)
# 3. Delete/disable the :80 server block above (or keep it ONLY to 301 → https,
#    which is safe under Full/Strict because CF then connects over https).
# 4. Uncomment and adapt the block below.
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name atlas.interchained.org;
#
#     ssl_certificate     /etc/ssl/cloudflare/atlas.pem;
#     ssl_certificate_key /etc/ssl/cloudflare/atlas.key;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_prefer_server_ciphers off;
#
#     # (repeat the set_real_ip_from ... real_ip_header CF-Connecting-IP block)
#     # (repeat the gzip + location blocks; X-Forwarded-Proto is naturally https)
# }
#
# # Optional companion redirect under Full(Strict):
# server {
#     listen 80;
#     listen [::]:80;
#     server_name atlas.interchained.org;
#     return 301 https://$host$request_uri;
# }
# ─────────────────────────────────────────────────────────────────────────────
